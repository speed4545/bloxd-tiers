<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd Tiers - Rankings Oficiales</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --row-bg: #1e252e;
            --row-border: #30363d;
            --text-main: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --rank-1-color: #f1c40f; 
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: var(--container-bg); border-bottom: 1px solid var(--row-border); border-radius: 8px; margin-bottom: 20px;}
        .logo { font-size: 24px; font-weight: bold; text-transform: uppercase; }
        .logo span { color: var(--accent-green); }

        /* BOTONES DE MODALIDAD */
        .mode-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; background: var(--container-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--row-border); }
        .mode-item { cursor: pointer; padding: 10px 25px; border-radius: 6px; color: var(--text-secondary); font-weight: bold; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .mode-item:hover { background: rgba(255,255,255,0.05); }
        .mode-item.active { background: var(--accent-green); color: white; }
        .mode-icon { font-size: 20px; }

        /* TABLA */
        .ranking-container { max-width: 1000px; margin: 0 auto; }
        .ranking-row { 
            display: grid; grid-template-columns: 50px 70px 1fr 80px 150px; 
            align-items: center; background: var(--row-bg); padding: 15px; 
            margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--row-border);
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .rank-number { font-size: 24px; font-weight: bold; color: var(--text-secondary); }
        .rank-1 { color: var(--rank-1-color) !important; }

        .skin { width: 50px; height: 50px; background: #252d38; border-radius: 5px; display: flex; justify-content: center; align-items: center; }
        .skin img { width: 80%; }

        .player-info { padding-left: 15px; }
        .player-name { font-size: 18px; font-weight: bold; margin: 0; }
        .player-stats { font-size: 13px; color: var(--text-secondary); margin: 0; }
        
        .region { font-weight: bold; font-size: 12px; padding: 4px 8px; border-radius: 4px; color: white; text-align: center; width: 30px;}
        .NA { background: #c0392b; } .EU { background: #2980b9; } .SA { background: #27ae60; }

        .medals { display: flex; gap: 5px; justify-content: flex-end; }
        .medal { background: #ccac00; width: 25px; height: 25px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; border: 1px solid gold;}
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BLOXD<span>TIERS</span></div>
        <div class="nav-links"><b>RANKINGS OFICIALES</b></div>
    </div>

    <div class="mode-bar">
        <div class="mode-item active" onclick="cambiarModalidad('potpvp', this)">
            <span class="mode-icon">🧪</span> PotPvP
        </div>
        <div class="mode-item" onclick="cambiarModalidad('holepvp', this)">
            <span class="mode-icon">🕳️</span> Hole PvP
        </div>
        <div class="mode-item" onclick="cambiarModalidad('uhc', this)">
            <span class="mode-icon">🍎</span> UHC
        </div>
    </div>

    <div id="ranking-list" class="ranking-container"></div>

    <script>
        // --- CONFIGURACIÓN FÁCIL: CAMBIA LOS NOMBRES AQUÍ ---
        const datosTiers = {
            potpvp: [
                { nombre: "Marlowww", puntos: 450, region: "NA", img: "🧪" },
                { nombre: "ItzRealMe", puntos: 330, region: "NA", img: "⚔️" },
                { nombre: "SpeedyPlayer", puntos: 210, region: "SA", img: "⚡" }
            ],
            holepvp: [
                { nombre: "HoleMaster", puntos: 500, region: "EU", img: "🕳️" },
                { nombre: "DeepDigger", puntos: 280, region: "NA", img: "⛏️" }
            ],
            uhc: [
                { nombre: "GoldenApple", puntos: 600, region: "SA", img: "🍎" },
                { nombre: "UHC_Pro", puntos: 420, region: "EU", img: "🏹" }
            ]
        };

        function cambiarModalidad(modo, elemento) {
            // Cambiar color del botón
            document.querySelectorAll('.mode-item').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');

            // Limpiar lista actual
            const lista = document.getElementById('ranking-list');
            lista.innerHTML = "";

            // Cargar nuevos jugadores
            datosTiers[modo].forEach((jugador, index) => {
                const fila = `
                    <div class="ranking-row">
                        <div class="rank-number ${index === 0 ? 'rank-1' : ''}">${index + 1}.</div>
                        <div class="skin"><span>${jugador.img}</span></div>
                        <div class="player-info">
                            <p class="player-name">${jugador.nombre}</p>
                            <p class="player-stats">Combat Master (<span>${jugador.puntos} pts</span>)</p>
                        </div>
                        <div class="region ${jugador.region}">${jugador.region}</div>
                        <div class="medals"><div class="medal">🏆</div></div>
                    </div>
                `;
                lista.innerHTML += fila;
            });
        }

        // Cargar PotPvP por defecto al abrir la página
        window.onload = () => {
            cambiarModalidad('potpvp', document.querySelector('.mode-item'));
        };
    </script>
</body>
</html>
