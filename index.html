<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd Tiers - Rankings</title>
    <style>
        :root {
            --bg-color: #111827;
            --container-bg: #1f2937;
            --row-bg: #111827;
            --row-border: #374151;
            --text-main: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-orange: #f97316;
            --ht-color: #fbbf24; /* Color para HT */
            --lt-color: #94a3b8; /* Color para LT */
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }

        /* HEADER */
        .logo { font-size: 24px; font-weight: bold; padding: 10px 40px; }
        .logo span { color: var(--accent-orange); }

        /* MODALIDADES */
        .mode-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; padding: 10px; }
        .mode-item { 
            cursor: pointer; padding: 8px 16px; border-radius: 8px; 
            background: #2d3748; color: var(--text-secondary); 
            font-size: 13px; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 5px;
        }
        .mode-item.active { background: var(--accent-orange); color: white; border-bottom: 3px solid white; }

        /* TABLA PRINCIPAL */
        .ranking-container { max-width: 1100px; margin: 0 auto; background: var(--container-bg); border-radius: 12px; padding: 20px; }

        /* ENCABEZADOS DE COLUMNA (Lo que pediste) */
        .table-header {
            display: grid; grid-template-columns: 50px 70px 1fr 100px 300px;
            padding: 10px 20px; color: var(--text-secondary); font-size: 12px; font-weight: bold;
            letter-spacing: 1px;
        }

        .ranking-row { 
            display: grid; grid-template-columns: 50px 70px 1fr 100px 300px; 
            align-items: center; background: var(--row-bg); padding: 15px 20px; 
            margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--row-border);
        }

        /* NÚMERO Y SKIN */
        .rank-number { font-size: 22px; font-weight: bold; font-style: italic; color: white; }
        .skin-box { width: 55px; height: 55px; background: linear-gradient(45deg, #374151, #111827); border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 24px; }

        /* INFO JUGADOR */
        .player-info { padding-left: 15px; }
        .player-name { font-size: 18px; font-weight: bold; margin: 0; }
        .player-title { font-size: 12px; color: var(--text-secondary); margin: 0; }
        .player-title span { color: #60a5fa; }

        /* REGION */
        .region-tag { font-weight: bold; background: #991b1b; padding: 2px 8px; border-radius: 4px; font-size: 12px; width: fit-content; justify-self: center; }
        .EU { background: #065f46; } /* Verde para EU */

        /* TIERS (Los dibujos y HT1) */
        .tiers-grid { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .tier-pill {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .tier-icon { 
            width: 24px; height: 24px; background: #374151; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; font-size: 12px;
            border: 1px solid var(--row-border);
        }
        .tier-label { font-size: 9px; font-weight: bold; padding: 1px 4px; border-radius: 3px; }
        .HT { background: var(--ht-color); color: #78350f; }
        .LT { background: var(--lt-color); color: #1e293b; }

    </style>
</head>
<body>

    <div class="logo">BLOXD<span>TIERS</span></div>

    <div class="mode-bar">
        <div class="mode-item active" onclick="cargar('overall', this)">🏆 Overall</div>
        <div class="mode-item" onclick="cargar('potpvp', this)">🧪 PotPvP</div>
        <div class="mode-item" onclick="cargar('holepvp', this)">🕳️ Hole PvP</div>
        <div class="mode-item" onclick="cargar('uhc', this)">🍎 UHC</div>
    </div>

    <div class="ranking-container">
        <div class="table-header">
            <div>#</div>
            <div></div>
            <div>PLAYER</div>
            <div style="text-align: center;">REGION</div>
            <div style="text-align: right;">TIERS</div>
        </div>

        <div id="lista"></div>
    </div>

    <script>
        const database = {
    overall: [
        { n: "Bastka", p: "450", r: "NA", s: "👤", t: [{i:"🧪", l:"HT1 High"}, {i:"🕳️", l:"---"}, {i:"🍎", l:"---"}] },
        { n: "ITz_EL_REY_OSCURO_IT1", p: "330", r: "NA", s: "👤", t: [{i:"🧪", l:"HT1 Mid"}, {i:"🕳️", l:"---"}, {i:"🍎", l:"---"}] },
        { n: "Plasyer", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"HT1 Low"}, {i:"🕳️", l:"---"}, {i:"🍎", l:"---"}] },
        { n: "CR7SPANISH_TM_LT1", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"LT1 High"}, {i:"🕳️", l:"---"}, {i:"🍎", l:"---"}] },
        { n: "Vientoferoz", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"LT1 Mid"}, {i:"🕳️", l:"---"}, {i:"🍎", l:"---"}] },
        { n: "woze", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"LT1 Low"}, {i:"🕳️", l:"---"}, {i:"🍎", l:"---"}] },
        { n: "panchisss", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"HT2 High"}, {i:"🕳️", l:"---"}, {i:"🍎", l:"---"}] },
        { n: "BD_zK4N_KevW1u_XvX", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"HT2 Mid"}, {i:"🕳️", l:"---"}, {i:"🍎", l:"---"}] }
    ],
    potpvp: [
        { n: "Bastka", p: "450", r: "NA", s: "👤", t: [{i:"🧪", l:"HT1 High"}] },
        { n: "ITz_EL_REY_OSCURO_IT1", p: "330", r: "NA", s: "👤", t: [{i:"🧪", l:"HT1 Mid"}] },
        { n: "Plasyer", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"HT1 Low"}] },
        { n: "CR7SPANISH_TM_LT1", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"LT1 High"}] },
        { n: "Vientoferoz", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"LT1 Mid"}] },
        { n: "woze", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"LT1 Low"}] },
        { n: "panchisss", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"HT2 High"}] },
        { n: "BD_zK4N_KevW1u_XvX", p: "296", r: "EU", s: "👤", t: [{i:"🧪", l:"HT2 Mid"}] }
    ],
    holepvp: [], 
    uhc: []
};
        function cargar(modo, btn) {
            document.querySelectorAll('.mode-item').forEach(m => m.classList.remove('active'));
            btn.classList.add('active');

            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = "";

            database[modo].forEach((j, i) => {
                let tiersHTML = j.t.map(tier => `
                    <div class="tier-pill">
                        <div class="tier-icon">${tier.i}</div>
                        <span class="tier-label ${tier.l.includes('HT') ? 'HT' : 'LT'}">${tier.l}</span>
                    </div>
                `).join('');

                contenedor.innerHTML += `
                    <div class="ranking-row">
                        <div class="rank-number">${i+1}.</div>
                        <div class="skin-box">${j.s}</div>
                        <div class="player-info">
                            <p class="player-name">${j.n}</p>
                            <p class="player-title">Combat Master (<span>${j.p} points</span>)</p>
                        </div>
                        <div class="region-tag ${j.r}">${j.r}</div>
                        <div class="tiers-grid">${tiersHTML}</div>
                    </div>
                `;
            });
        }

        window.onload = () => cargar('overall', document.querySelector('.mode-item'));
    </script>
</body>
</html>
