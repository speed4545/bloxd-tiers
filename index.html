<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd Tiers - Rankings Oficiales</title>
    <style>
        /* ESTILOS GLOBALES */
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --row-bg: #1e252e;
            --row-border: #30363d;
            --text-main: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --rank-1-color: #f1c40f; 
            --rank-2-color: #bdc3c7; 
            --rank-3-color: #e67e22; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--row-border);
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; }
        .logo span { color: var(--accent-green); }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-size: 14px; }
        .nav-links a.active { color: var(--text-main); font-weight: bold; }

        .search-bar {
            background-color: var(--bg-color);
            border: 1px solid var(--row-border);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 20px;
            width: 250px;
        }

        /* BARRA DE MODALIDADES SOLICITADAS */
        .mode-bar {
            background-color: var(--container-bg);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--row-border);
        }

        .mode-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .mode-item:hover { background-color: rgba(255,255,255,0.05); color: var(--text-main); }
        .mode-item.active { background-color: var(--accent-green); color: white; }

        .mode-icon { font-size: 24px; margin-bottom: 5px; }

        /* TABLA DE RANKING */
        .ranking-container { max-width: 1200px; margin: 0 auto; }

        .ranking-row {
            background-color: var(--row-bg);
            border: 1px solid var(--row-border);
            border-radius: 8px;
            display: grid;
            grid-template-columns: 60px 80px 1fr 100px 300px;
            align-items: center;
            padding: 15px 25px;
            margin-bottom: 12px;
        }

        .rank-number { font-size: 32px; font-weight: bold; font-style: italic; color: var(--text-secondary); }
        .ranking-row:nth-child(1) .rank-number { color: var(--rank-1-color); }

        .player-skin-container {
            width: 60px; height: 60px;
            background-color: #252d38;
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            border: 2px solid var(--row-border);
        }
        .player-skin { max-width: 90%; }

        .player-info { padding-left: 20px; }
        .player-name { font-size: 22px; font-weight: bold; color: var(--text-main); margin: 0; }
        .player-stats { color: var(--text-secondary); font-size: 14px; }
        .player-stats span { color: var(--accent-green); }

        .player-region {
            font-weight: bold; font-size: 14px; text-align: center;
            padding: 5px 10px; border-radius: 4px; color: white;
            justify-self: center; width: 40px;
        }
        .region-na { background-color: #c0392b; }
        .region-eu { background-color: #2980b9; }

        .player-medals { display: flex; gap: 8px; justify-content: flex-end; }
        .medal {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; background-color: #ccac00; border: 2px solid #ffff00;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BLOXD<span>TIERS</span></div>
        <div class="nav-links">
            <a href="#" class="active">Rankings</a>
            <a href="#">Discord</a>
            <a href="#">Cómo Funciona</a>
        </div>
        <input type="text" class="search-bar" placeholder="🔍 Buscar jugador...">
    </div>

    <div class="mode-bar">
        <div class="mode-item active">
            <span class="mode-icon">🧪</span>
            PotPvP
        </div>
        <div class="mode-item">
            <span class="mode-icon">🕳️</span>
            Hole PvP
        </div>
        <div class="mode-item">
            <span class="mode-icon">🍎</span>
            UHC
        </div>
    </div>

    <div class="ranking-container">
        <div class="ranking-row">
            <div class="rank-number">1.</div>
            <div class="player-skin-container">
                <img src="https://image_0.png?crop=60,60,60,80" alt="Skin" class="player-skin">
            </div>
            <div class="player-info">
                <p class="player-name">Marlowww</p>
                <p class="player-stats">Combat Grandmaster (<span>450 points</span>)</p>
            </div>
            <div class="player-region region-na">NA</div>
            <div class="player-medals">
                <div class="medal">⚔️</div>
                <div class="medal">🧪</div>
                <div class="medal">🍎</div>
            </div>
        </div>

        <div class="ranking-row">
            <div class="rank-number">2.</div>
            <div class="player-skin-container">
                <img src="https://image_0.png?crop=60,60,60,160" alt="Skin" class="player-skin">
            </div>
            <div class="player-info">
                <p class="player-name">ItzRealMe</p>
                <p class="player-stats">Combat Master (<span>330 points</span>)</p>
            </div>
            <div class="player-region region-na">NA</div>
            <div class="player-medals">
                <div class="medal">⚔️</div>
                <div class="medal">🕳️</div>
            </div>
        </div>
        
        </div>

</body>
</html>
