<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd Tiers - Rankings Oficiales</title>
    <style>
        /* ESTILOS GLOBALES (El look oscuro de MCTiers) */
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --row-bg: #1e252e;
            --row-border: #30363d;
            --text-main: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --rank-1-color: #f1c40f; /* Oro */
            --rank-2-color: #bdc3c7; /* Plata */
            --rank-3-color: #e67e22; /* Bronce */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* HEADER (Barra de arriba) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--row-border);
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .logo span { color: var(--accent-green); }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-size: 14px; transition: color 0.3s;}
        .nav-links a:hover { color: var(--text-main); }
        .nav-links a.active { color: var(--text-main); font-weight: bold; }

        .search-bar {
            background-color: var(--bg-color);
            border: 1px solid var(--row-border);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 20px;
            width: 250px;
        }

        /* BARRA DE MODALIDADES (Los iconos de arriba) */
        .mode-bar {
            background-color: var(--container-bg);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--row-border);
        }

        .mode-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            padding: 10px;
            border-radius: 8px;
            width: 60px;
        }

        .mode-item:hover { transform: translateY(-3px); background-color: rgba(255,255,255,0.05); color: var(--text-main);}
        .mode-item.active { background-color: var(--accent-green); color: white; box-shadow: 0 0 10px rgba(63, 185, 80, 0.5);}

        .mode-icon { font-size: 24px; margin-bottom: 5px; }

        /* TABLA DE RANKING (El cuerpo principal) */
        .ranking-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .ranking-row {
            background-color: var(--row-bg);
            border: 1px solid var(--row-border);
            border-radius: 8px;
            display: grid;
            grid-template-columns: 60px 80px 1fr 100px minmax(200px, 300px); /* Ajuste de columnas */
            align-items: center;
            padding: 15px 25px;
            margin-bottom: 12px;
            transition: background-color 0.2s;
        }

        .ranking-row:hover { background-color: #252d38; }

        /* Columna 1: Número */
        .rank-number {
            font-size: 32px;
            font-weight: bold;
            font-style: italic;
            color: var(--text-secondary);
        }
        .ranking-row:nth-child(1) .rank-number { color: var(--rank-1-color); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .ranking-row:nth-child(2) .rank-number { color: var(--rank-2-color); }
        .ranking-row:nth-child(3) .rank-number { color: var(--rank-3-color); }

        /* Columna 2: Skin */
        .player-skin-container {
            width: 60px;
            height: 60px;
            background-color: #252d38; /* Fondo detrás del skin */
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid var(--row-border);
        }
        .player-skin { max-width: 90%; max-height: 90%; }

        /* Columna 3: Nombre y Puntos */
        .player-info { padding-left: 20px; }
        .player-name { font-size: 22px; font-weight: bold; color: var(--text-main); margin: 0; }
        .player-stats { color: var(--text-secondary); font-size: 14px; margin: 2px 0 0 0; }
        .player-stats span { color: var(--accent-green); font-weight: bold; }

        /* Columna 4: Región */
        .player-region {
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
            width: fit-content;
            justify-self: center;
        }
        .region-na { background-color: #c0392b; } /* Rojo para NA */
        .region-eu { background-color: #2980b9; } /* Azul para EU */
        .region-sa { background-color: #27ae60; } /* Verde para SA (Latam) */

        /* Columna 5: Medallas/Logros */
        .player-medals {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end; /* Alineado a la derecha como en la imagen */
        }

        .medal {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            border: 2px solid transparent;
        }

        /* Ejemplo de Medallas estilo Bloxd.io */
        .medal-pvp { background-color: #ccac00; border-color: #ffff00; } /* Oro */
        .medal-build { background-color: #2980b9; border-color: #3498db; } /* Construcción */
        .medal-parkour { background-color: #8e44ad; border-color: #9b59b6; } /* Parkour */
        .medal-losing { background-color: #c0392b; opacity: 0.6; } /* Mala racha */

    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BLOXD<span>TIERS</span></div>
        <div class="nav-links">
            <a href="#" class="active">Rankings</a>
            <a href="#">Discord</a>
            <a href="#">Cómo Funciona</a>
        </div>
        <input type="text" class="search-bar" placeholder="🔍 Buscar jugador...">
    </div>

    <div class="mode-bar">
        <div class="mode-item active"><span class="mode-icon">🏆</span>Global</div>
        <div class="mode-item"><span class="mode-icon">⚔️</span>PvP</div>
        <div class="mode-item"><span class="mode-icon">🧱</span>Build</div>
        <div class="mode-item"><span class="mode-icon">🏃</span>Parkour</div>
        <div class="mode-item"><span class="mode-icon">🏹</span>Arco</div>
        <div class="mode-item"><span class="mode-icon">💣</span>TNT</div>
        <div class="mode-item"><span class="mode-icon">⛏️</span>Survival</div>
    </div>

    <div class="ranking-container">

        <div class="ranking-row">
            <div class="rank-number">1.</div>
            <div class="player-skin-container">
                <img src="https://via.placeholder.com/60/ffffff/000000?text=Skin1" alt="Skin" class="player-skin">
            </div>
            <div class="player-info">
                <p class="player-name">ProBloxd_99</p>
                <p class="player-stats">Gran Maestro del Combate (<span>450 pts</span>)</p>
            </div>
            <div class="player-region region-sa">SA</div>
            <div class="player-medals">
                <div class="medal medal-pvp" title="Maestro PvP">⚔️</div>
                <div class="medal medal-build" title="Constructor Elite">🧱</div>
                <div class="medal medal-parkour" title="Velocista">🏃</div>
                <div class="medal medal-parkour" title="Pro en TNT">💣</div>
            </div>
        </div>

        <div class="ranking-row">
            <div class="rank-number">2.</div>
            <div class="player-skin-container">
                <img src="https://via.placeholder.com/60/ffffff/000000?text=Skin2" alt="Skin" class="player-skin">
            </div>
            <div class="player-info">
                <p class="player-name">ItzAlexBloxd</p>
                <p class="player-stats">Maestro del Combate (<span>330 pts</span>)</p>
            </div>
            <div class="player-region region-na">NA</div>
            <div class="player-medals">
                <div class="medal medal-pvp" title="Experto PvP">⚔️</div>
                <div class="medal medal-parkour" title="Velocista">🏃</div>
                <div class="medal medal-losing" title="Baja racha">⬇️</div>
            </div>
        </div>

        <div class="ranking-row">
            <div class="rank-number">3.</div>
            <div class="player-skin-container">
                <img src="https://via.placeholder.com/60/ffffff/000000?text=Skin3" alt="Skin" class="player-skin">
            </div>
            <div class="player-info">
                <p class="player-name">BloxdManiac</p>
                <p class="player-stats">Experto en Supervivencia (<span>296 pts</span>)</p>
            </div>
            <div class="player-region region-eu">EU</div>
            <div class="player-medals">
                <div class="medal medal-pvp" title="PvP Amateur">⚔️</div>
                <div class="medal medal-build" title="Maestro Constructor">🧱</div>
            </div>
        </div>

        </div>

</body>
</html>
